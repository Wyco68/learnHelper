<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Notes</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #0a0e14;
    color: #d1d5db;
    font-family: -apple-system, "Segoe UI", sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
  }
  .panel {
    text-align: center;
  }
  .title {
    font-size: 20px;
    font-weight: 600;
    color: #e5e7eb;
    margin-bottom: 14px;
  }
  .stage {
    font-size: 13px;
    color: #9ca3af;
  }
  .spinner {
    width: 22px;
    height: 22px;
    margin: 0 auto 16px;
    border: 2px solid rgba(255, 255, 255, 0.1);
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>
  <div class="panel">
    <div class="spinner"></div>
    <div class="title">Notes</div>
    <div class="stage" id="stage">Starting...</div>
  </div>
  <script>
    window.__TAURI__.event.listen("stage-update", (event) => {
      document.getElementById("stage").textContent = event.payload;
    });
  </script>
</body>
</html>
